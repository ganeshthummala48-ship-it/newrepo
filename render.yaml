services:
  - type: web
    name: farmerai-backend
    env: python
    # Declare Python 3.11.9 at the service level (Render's native runtime key)
    runtime: python-3.11.9
    buildCommand: pip install --upgrade pip && pip install -r farmerai_backend/requirements.txt
    startCommand: cd farmerai_backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: KERAS_BACKEND
        value: tensorflow
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
