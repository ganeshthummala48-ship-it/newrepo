services:
  - type: web
    name: farmerai-backend
    env: python
    rootDir: farmerai_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.13.5
